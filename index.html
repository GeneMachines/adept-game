<body>
    <div id="game-wrapper">
        <canvas id="game-canvas"></canvas>
        <div id="touch-controls">
            <button class="touch-btn btn-back" id="btn-back">BACK</button>
            <button class="touch-btn" id="btn-charge">HOLD</button>
            <div class="toggle-group hidden" id="toggle-group">
                <button class="toggle-opt" id="btn-enzyme">ENZYME</button>
                <button class="toggle-opt" id="btn-prodrug">PRODRUG</button>
            </div>
            <div class="results-btns hidden" id="results-btns">
                <button class="touch-btn btn-result" id="btn-retry">RETRY</button>
                <button class="touch-btn btn-result" id="btn-next">NEXT</button>
                <button class="touch-btn btn-result btn-info" id="btn-info">INFO</button>
            </div>
        </div>
    </div>

    <!-- Engine -->
    <script src="js/engine/physics.js?v=47"></script>
    <script src="js/engine/pk.js?v=47"></script>
    <script src="js/engine/input.js?v=47"></script>
    <script src="js/engine/scoring.js?v=47"></script>
    <script src="js/engine/sound.js?v=47"></script>
    <script src="js/debug-panel.js?v=47"></script>

    <!-- Entities -->
    <script src="js/entities/entity.js?v=47"></script>
    <script src="js/entities/molecule.js?v=47"></script>
    <script src="js/entities/cuttlefish.js?v=47"></script>
    <script src="js/entities/tumor.js?v=47"></script>
    <script src="js/entities/chemo.js?v=47"></script>
    <script src="js/entities/adc.js?v=47"></script>
    <script src="js/entities/antibody-enzyme.js?v=47"></script>
    <script src="js/entities/prodrug.js?v=47"></script>
    <script src="js/entities/active-drug.js?v=47"></script>

    <!-- Config -->
    <script src="js/config/text.js?v=47"></script>

    <!-- Rendering -->
    <script src="js/rendering/sprites.js?v=47"></script>
    <script src="js/rendering/particles.js?v=47"></script>
    <script src="js/rendering/renderer.js?v=47"></script>
    <script src="js/rendering/bitmap-font.js?v=47"></script>
    <script src="js/rendering/hud.js?v=47"></script>

    <!-- Modes -->
    <script src="js/modes/mode-base.js?v=47"></script>
    <script src="js/modes/mode-chemo.js?v=47"></script>
    <script src="js/modes/mode-adc.js?v=47"></script>
    <script src="js/modes/mode-adept.js?v=47"></script>

    <!-- Game Loop -->
    <script src="js/engine/game.js?v=47"></script>
    <script src="js/main.js?v=47"></script>
</body>
